<!doctype html>
<html lang="lv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pārbūve.lv — Dzīvokļu pārplānošana un pārbūve Rīgā</title>
<meta name="description" content="Sertificēts arhitektu birojs un būvkomersants. Dzīvokļu pārplānošana, nesošās sienas, lodžiju iestiklošana un projektu legalizācija." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:hsl(38 30% 96%);--fg:hsl(220 38% 11%);--ink-soft:hsl(220 20% 28%);
  --paper:hsl(38 22% 92%);--card:hsl(38 30% 98%);--muted:hsl(220 14% 38%);
  --border:hsl(220 14% 84%);--accent:hsl(22 88% 52%);--accent2:hsl(14 82% 44%);
  --grid:hsl(220 14% 84% / .6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Fraunces',Georgia,serif;font-weight:400;letter-spacing:-0.02em;line-height:1.05}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.container{max-width:1280px;margin:0 auto;padding:0 24px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--muted)}
.rule{height:1px;background:hsl(220 38% 11% / .15);width:100%}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;border-radius:2px;font-weight:500;font-size:14px;border:1px solid var(--fg);transition:.2s}
.btn-primary{background:var(--fg);color:var(--bg)}
.btn-primary:hover{background:var(--accent);border-color:var(--accent)}
.btn-outline{background:transparent;color:var(--fg)}
.btn-outline:hover{background:var(--fg);color:var(--bg)}

/* HEADER */
header{position:sticky;top:0;z-index:50;background:hsl(38 30% 96% / .9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;max-width:1280px;margin:0 auto}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-0.02em}
.logo span{color:var(--accent)}
.nav-links{display:none;gap:28px;font-size:13px;color:var(--ink-soft)}
.nav-links a:hover{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:16px}
.lang{display:flex;gap:4px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.15em}
.lang button{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;font:inherit;text-transform:uppercase}
.lang button.active{color:var(--accent);font-weight:600}
@media(min-width:1024px){.nav-links{display:flex}}

/* HERO */
.hero{position:relative;padding:80px 0 100px;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(to right,var(--grid) 1px,transparent 1px),linear-gradient(to bottom,var(--grid) 1px,transparent 1px);background-size:80px 80px;opacity:.4;pointer-events:none}
.hero-tags{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:48px}
.hero h1{font-size:clamp(48px,9vw,140px);font-weight:300;margin-bottom:48px}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-bottom{display:grid;grid-template-columns:1fr;gap:48px;margin-top:64px}
@media(min-width:768px){.hero-bottom{grid-template-columns:1.2fr 1fr}}
.hero-lead{font-size:18px;color:var(--ink-soft);max-width:520px;margin-bottom:32px}
.hero-lead strong{color:var(--fg);font-weight:500}
.cta-row{display:flex;gap:12px;flex-wrap:wrap}
.hero-caption{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;align-self:end}

/* QUICK */
.quick{padding:64px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--paper)}
.quick-grid{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:768px){.quick-grid{grid-template-columns:repeat(3,1fr)}}
.quick-item{padding:32px 24px;border-right:1px solid var(--border)}
.quick-item:last-child{border-right:none}
.quick-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:16px;letter-spacing:.2em}
.quick-item h3{font-size:24px;margin-bottom:12px}
.quick-item p{color:var(--ink-soft);font-size:14px;margin-bottom:16px}
.quick-item a{font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.2em;color:var(--fg);border-bottom:1px solid var(--fg);padding-bottom:2px}
.quick-item a:hover{color:var(--accent);border-color:var(--accent)}

/* SECTION */
section{padding:96px 0}
.section-head{margin-bottom:64px}
.section-head .eyebrow{margin-bottom:24px;display:block}
.section-head h2{font-size:clamp(36px,6vw,72px);font-weight:300}
.section-head h2 em{font-style:italic;color:var(--accent)}
.section-lead{font-size:18px;color:var(--ink-soft);max-width:640px;margin-top:24px}

/* WHY */
.why-grid{display:grid;grid-template-columns:1fr;gap:32px}
@media(min-width:768px){.why-grid{grid-template-columns:repeat(3,1fr)}}
.why-item{padding:32px;border:1px solid var(--border);background:var(--card)}
.why-num{font-family:'JetBrains Mono',monospace;font-size:48px;color:var(--accent);font-weight:300;margin-bottom:24px;line-height:1}
.why-item h3{font-size:28px;margin-bottom:16px}
.why-item p{color:var(--ink-soft);font-size:15px}
.why-item .lnk{display:inline-block;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);border-bottom:1px solid var(--accent);padding-bottom:2px}

/* STATS */
.stats{background:var(--fg);color:var(--bg);padding:96px 0}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:48px}
@media(min-width:768px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-v{font-family:'Fraunces',serif;font-size:clamp(56px,8vw,96px);font-weight:300;color:var(--accent);line-height:1;margin-bottom:12px}
.stat-l{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:hsl(38 30% 96% / .7)}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:1fr;gap:0;border-top:1px solid var(--border)}
@media(min-width:768px){.services-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.services-grid{grid-template-columns:repeat(3,1fr)}}
.service{padding:40px 32px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--card)}
.service-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.2em;margin-bottom:24px}
.service h3{font-size:24px;margin-bottom:12px}
.service > p{color:var(--ink-soft);font-size:14px;margin-bottom:20px}
.service ul{list-style:none;font-size:13px;color:var(--ink-soft)}
.service li{padding:6px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.service li:before{content:"→";color:var(--accent)}
.service li:last-child{border-bottom:none}

/* OFFERS */
.offers-list{columns:1;column-gap:48px;list-style:none}
@media(min-width:768px){.offers-list{columns:2}}
@media(min-width:1024px){.offers-list{columns:3}}
.offers-list li{padding:14px 0;border-bottom:1px solid var(--border);font-size:15px;color:var(--ink-soft);break-inside:avoid;display:flex;gap:12px}
.offers-list li:before{content:"§";color:var(--accent);font-family:'Fraunces',serif}

/* MANIFESTO */
.manifesto{background:var(--fg);color:var(--bg);padding:120px 0}
.manifesto h2{font-size:clamp(40px,7vw,84px);font-weight:300;margin-bottom:40px}
.manifesto h2 em{font-style:italic;color:var(--accent)}
.manifesto p{font-size:18px;color:hsl(38 30% 96% / .75);max-width:720px;margin-bottom:48px}
.manifesto ul{list-style:none;display:grid;gap:16px}
.manifesto li{padding:16px 0;border-bottom:1px solid hsl(38 30% 96% / .15);font-size:15px;display:flex;gap:16px}
.manifesto li:before{content:"●";color:var(--accent)}

/* PROCESS */
.process-grid{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:768px){.process-grid{grid-template-columns:repeat(4,1fr)}}
.step{padding:32px;border:1px solid var(--border);background:var(--card)}
.step-n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.2em;margin-bottom:32px}
.step h3{font-size:24px;margin-bottom:12px}
.step p{color:var(--ink-soft);font-size:14px}

/* TESTIMONIALS */
.t-grid{display:grid;grid-template-columns:1fr;gap:24px}
@media(min-width:768px){.t-grid{grid-template-columns:repeat(3,1fr)}}
.tcard{padding:32px;border:1px solid var(--border);background:var(--card)}
.tcard p{font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--fg);margin-bottom:24px;line-height:1.4}
.tcard .who{font-weight:500;font-size:14px}
.tcard .where{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-top:4px}

/* LOCATIONS */
.loc-grid{display:grid;grid-template-columns:1fr;gap:48px}
@media(min-width:768px){.loc-grid{grid-template-columns:1fr 1fr}}
.loc-list{display:flex;flex-wrap:wrap;gap:8px}
.loc-list span{padding:8px 16px;border:1px solid var(--border);font-size:13px;background:var(--card)}
.loc-list .more{background:var(--fg);color:var(--bg);border-color:var(--fg)}

/* CONTACT */
.contact{background:var(--paper)}
.contact-grid{display:grid;grid-template-columns:1fr;gap:48px}
@media(min-width:1024px){.contact-grid{grid-template-columns:1fr 1fr}}
.cinfo div{padding:20px 0;border-bottom:1px solid var(--border)}
.cinfo .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-bottom:8px}
.cinfo .val{font-size:18px;white-space:pre-line}
form{background:var(--card);padding:32px;border:1px solid var(--border)}
form h3{font-size:24px;margin-bottom:24px}
form label{display:block;margin-bottom:16px}
form .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-bottom:6px;display:block}
form input,form textarea{width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);font:inherit;font-size:14px;border-radius:2px}
form textarea{min-height:120px;resize:vertical}
form button{width:100%;margin-top:8px}
.disclaimer{font-size:11px;color:var(--muted);margin-top:16px;line-height:1.5}

/* FOOTER */
footer{background:var(--fg);color:var(--bg);padding:64px 0 32px}
.foot-grid{display:grid;grid-template-columns:1fr;gap:48px;margin-bottom:48px}
@media(min-width:768px){.foot-grid{grid-template-columns:2fr 1fr 1fr 1fr}}
.foot-grid h4{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-bottom:16px;font-weight:500}
.foot-grid ul{list-style:none}
.foot-grid li{padding:6px 0;font-size:13px;color:hsl(38 30% 96% / .7)}
.foot-grid li a:hover{color:var(--accent)}
.foot-tagline{color:hsl(38 30% 96% / .7);font-size:14px;margin-top:12px;max-width:320px}
.foot-bottom{border-top:1px solid hsl(38 30% 96% / .15);padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:hsl(38 30% 96% / .5)}
</style>
</head>

  // quick
  document.getElementById('quick-grid').innerHTML = t.quick.map((q,i)=>`
    <div class="quick-item">
      <div class="quick-num">0${i+1}</div>
      <h3>${q.t}</h3><p>${q.s}</p>
      <a href="#services">${q.more}</a>
    </div>`).join('');

  // why
  document.getElementById('why-grid').innerHTML = t.why.reasons.map((r,i)=>`
    <div class="why-item">
      <div class="why-num">0${i+1}</div>
      <h3>${r.title}</h3><p>${r.desc}</p>
      ${r.linkLabel?`<a class="lnk" target="_blank" rel="noopener" href="https://bis.gov.lv">${r.linkLabel}</a>`:''}
    </div>`).join('');

  // stats
  document.getElementById('stats-grid').innerHTML = t.stats.map(s=>`
    <div><div class="stat-v">${s.v}</div><div class="stat-l">${s.l}</div></div>
  `).join('');

  // services
  document.getElementById('services-grid').innerHTML = t.services.list.map((s,i)=>`
    <div class="service">
      <div class="service-num">0${i+1} / 0${t.services.list.length}</div>
      <h3>${s.title}</h3><p>${s.desc}</p>
      <ul>${s.items.map(x=>`<li>${x}</li>`).join('')}</ul>
    </div>`).join('');

  // offers
  document.getElementById('offers-list').innerHTML = t.offers.items.map(x=>`<li>${x}</li>`).join('');

  // manifesto
  document.getElementById('manifesto-list').innerHTML = t.manifesto.bullets.map(x=>`<li>${x}</li>`).join('');

  // process
  document.getElementById('process-grid').innerHTML = t.process.steps.map((s,i)=>`
    <div class="step">
      <div class="step-n">${t.process.step} 0${i+1}</div>
      <h3>${s.t}</h3><p>${s.d}</p>
    </div>`).join('');

  // testimonials
  document.getElementById('t-grid').innerHTML = t.testimonials.list.map(x=>`
    <div class="tcard"><p>"${x.text}"</p><div class="who">${x.name}</div><div class="where">${x.location}</div></div>
  `).join('');

  // locations
  document.getElementById('loc-list').innerHTML = t.locations.list.map(x=>`<span>${x}</span>`).join('') + `<span class="more">${t.locations.regions}</span>`;

  // footer services
  document.getElementById('foot-services').innerHTML = t.services.list.map(s=>`<li><a href="#services">${s.title}</a></li>`).join('');
}

function setLang(l){
  lang = l;
  localStorage.setItem('parbuve_lang', l);
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));
  fillSimple();
  renderDynamic();
}

document.querySelectorAll('.lang button').forEach(b=>{
  b.addEventListener('click', ()=>setLang(b.dataset.lang));
});

document.getElementById('contact-form').addEventListener('submit', (e)=>{
  e.preventDefault();
  const f = new FormData(e.target);
  const t = T[lang].contact.form;
  const name = f.get('name'), phone = f.get('phone'), email = f.get('email'), message = f.get('message');
  const subject = encodeURIComponent(t.subject(name));
  const body = encodeURIComponent(`${t.bodyLabels.name}: ${name}\n${t.bodyLabels.phone}: ${phone}\n${t.bodyLabels.email}: ${email}\n\n${message}`);
  window.location.href = `mailto:info@parbuve.lv?subject=${subject}&body=${body}`;
});

setLang(lang);
</script>
</body>
</html>
